x-worker-base: &worker-base
  build: .
  restart: unless-stopped
  env_file: .env
  environment:
    DATABASE_URL: ${DATABASE_URL}
    REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
    ORDER_QUEUE_NAME: ${ORDER_QUEUE_NAME:-order.create}
  command: ["python", "-m", "workers.order_consumer"]
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
    rabbitmq:
      condition: service_healthy

services:

  db:
    image: postgres:16-alpine
    container_name: order_db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: order_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: order_rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: order_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      ORDER_QUEUE_NAME: ${ORDER_QUEUE_NAME:-order.create}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s

  k6:
    image: grafana/k6:0.51.0
    container_name: order_k6
    profiles: ["loadtest"]
    environment:
      BASE_URL: http://api:8000
    volumes:
      - ./tests/k6:/scripts:ro
    command: ["run", "/scripts/order_flow_test.js"]
    depends_on:
      api:
        condition: service_healthy

  worker_1:
    <<: *worker-base
    container_name: order_worker_1

  worker_2:
    <<: *worker-base
    container_name: order_worker_2

  worker_3:
    <<: *worker-base
    container_name: order_worker_3

  worker_4:
    <<: *worker-base
    container_name: order_worker_4

  worker_5:
    <<: *worker-base
    container_name: order_worker_5

networks:
  default:
    driver: bridge

volumes:
  postgres_data:
